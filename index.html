    <script>
        // 清空所有数据
        function clearAllData() {
            if (confirm('确定要清空所有数据吗？此操作不可恢复。')) {
                // 清空甲方信息
                document.getElementById('party-a-name').value = '';
                document.getElementById('party-a-contact').value = '';
                document.getElementById('party-a-phone').value = '';
                
                // 清空乙方信息
                document.getElementById('party-b-name').value = '';
                document.getElementById('party-b-contact').value = '';
                document.getElementById('party-b-phone').value = '';
                
                // 清空项目信息
                document.getElementById('project-name').value = '';
                document.getElementById('inquiry-date').value = '';
                
                // 清空货物清单
                const goodsContainer = document.getElementById('goods-list-container');
                goodsContainer.innerHTML = `
                    <div class="goods-item">
                        <input type="text" class="goods-name" placeholder="名称">
                        <input list="units" type="text" class="goods-spec" placeholder="单位">
                        <datalist id="units">
                            <option value="个">
                            <option value="件">
                            <option value="套">
                            <option value="台">
                            <option value="套">
                            <option value="千克">
                            <option value="克">
                            <option value="吨">
                            <option value="米">
                            <option value="厘米">
                            <option value="毫米">
                            <option value="升">
                            <option value="毫升">
                            <option value="平方米">
                            <option value="立方米">
                        </datalist>
                        <input type="number" class="goods-quantity" placeholder="数量" oninput="calculateTotal()">
                        <input type="text" class="goods-price" placeholder="单价" oninput="calculateTotal()">
                        <input type="number" class="goods-amount" placeholder="金额" readonly>
                        <input type="text" class="goods-remark" placeholder="备注">
                        <button class="btn-primary" onclick="addGoodsItem()">+</button>
                        <button class="btn-danger" onclick="removeGoodsItem(this)">-</button>
                    </div>
                `;
                
                // 清空总金额
                document.getElementById('total-amount').value = '';
                
                // 显示成功消息
                alert('所有数据已清空');
                
                // 重新添加一个默认的货物项
                addGoodsItem();
                // 移除多余的货物项，只保留一个
                const items = goodsContainer.querySelectorAll('.goods-item');
                if (items.length > 1) {
                    goodsContainer.removeChild(items[1]);
                }
            }
        }
        
        // 添加货物项目
        function addGoodsItem() {
            const container = document.getElementById('goods-list-container');
            const newItem = document.createElement('div');
            newItem.className = 'goods-item';
            newItem.innerHTML = `
                <input type="text" class="goods-name" placeholder="名称">
                <input list="units" type="text" class="goods-spec" placeholder="单位">
                <input type="number" class="goods-quantity" placeholder="数量" oninput="calculateTotal()">
                <input type="text" class="goods-price" placeholder="单价" oninput="calculateTotal()">
                <input type="number" class="goods-amount" placeholder="金额" readonly>
                <input type="text" class="goods-remark" placeholder="备注">
                <button class="btn-primary" onclick="addGoodsItem()">+</button>
                <button class="btn-danger" onclick="removeGoodsItem(this)">-</button>
            `;
            container.appendChild(newItem);
        }
        
        // 移除货物项目
        function removeGoodsItem(button) {
            const item = button.parentElement;
            const container = item.parentElement;
            if (container.children.length > 1) {
                container.removeChild(item);
                calculateTotal();
            }
        }
        
        // 计算总金额
        function calculateTotal() {
            const items = document.querySelectorAll('.goods-item');
            let total = 0;
            
            items.forEach(item => {
                const quantity = parseFloat(item.querySelector('.goods-quantity').value) || 0;
                // 处理文本输入的单价
                const priceInput = item.querySelector('.goods-price');
                let priceValue = priceInput.value;
                // 移除非数字和小数点字符
                priceValue = priceValue.replace(/[^0-9.]/g, '');
                // 确保只有一个小数点
                const parts = priceValue.split('.');
                if (parts.length > 2) {
                    priceValue = parts[0] + '.' + parts.slice(1).join('');
                }
                // 计算金额
                const price = parseFloat(priceValue) || 0;
                const amount = quantity * price;
                item.querySelector('.goods-amount').value = amount.toFixed(2);
                total += amount;
            });
            
            document.getElementById('total-amount').value = total.toFixed(2) + '元';
        }
        
        // 页面加载时从本地存储读取数据
        window.onload = function() {
            // 读取本地存储的甲乙双方信息列表
            const savedPartyAList = localStorage.getItem('partyAList');
            const savedPartyBList = localStorage.getItem('partyBList');
            
            const partyAList = savedPartyAList ? JSON.parse(savedPartyAList) : [];
            const partyBList = savedPartyBList ? JSON.parse(savedPartyBList) : [];
            
            // 填充甲方信息下拉列表
            const partyADataList = document.getElementById('party-a-list');
            partyAList.forEach(partyA => {
                const option = document.createElement('option');
                option.value = partyA.name;
                option.setAttribute('data-contact', partyA.contact);
                option.setAttribute('data-phone', partyA.phone);
                partyADataList.appendChild(option);
            });
            
            // 填充乙方信息下拉列表
            const partyBDataList = document.getElementById('party-b-list');
            partyBList.forEach(partyB => {
                const option = document.createElement('option');
                option.value = partyB.name;
                option.setAttribute('data-contact', partyB.contact);
                option.setAttribute('data-phone', partyB.phone);
                partyBDataList.appendChild(option);
            });
        };
        
        // 保存甲乙双方信息到本地存储
        function savePartyInfo() {
            const partyA = {
                name: document.getElementById('party-a-name').value,
                contact: document.getElementById('party-a-contact').value,
                phone: document.getElementById('party-a-phone').value
            };
            
            const partyB = {
                name: document.getElementById('party-b-name').value,
                contact: document.getElementById('party-b-contact').value,
                phone: document.getElementById('party-b-phone').value
            };
            
            // 读取现有列表
            const savedPartyAList = localStorage.getItem('partyAList');
            const savedPartyBList = localStorage.getItem('partyBList');
            
            let partyAList = savedPartyAList ? JSON.parse(savedPartyAList) : [];
            let partyBList = savedPartyBList ? JSON.parse(savedPartyBList) : [];
            
            // 检查是否已存在相同名称的记录
            const partyAIndex = partyAList.findIndex(item => item.name === partyA.name);
            const partyBIndex = partyBList.findIndex(item => item.name === partyB.name);
            
            // 更新或添加记录
            if (partyAIndex > -1) {
                partyAList[partyAIndex] = partyA;
            } else if (partyA.name) {
                partyAList.push(partyA);
            }
            
            if (partyBIndex > -1) {
                partyBList[partyBIndex] = partyB;
            } else if (partyB.name) {
                partyBList.push(partyB);
            }
            
            // 保存更新后的列表
            localStorage.setItem('partyAList', JSON.stringify(partyAList));
            localStorage.setItem('partyBList', JSON.stringify(partyBList));
        }
        
        // 选择甲方信息
        function selectPartyA() {
            const partyAName = document.getElementById('party-a-name');
            const selectedOption = document.querySelector(`#party-a-list option[value="${partyAName.value}"]`);
            if (selectedOption) {
                document.getElementById('party-a-contact').value = selectedOption.getAttribute('data-contact');
                document.getElementById('party-a-phone').value = selectedOption.getAttribute('data-phone');
            }
        }
        
        // 选择乙方信息
        function selectPartyB() {
            const partyBName = document.getElementById('party-b-name');
            const selectedOption = document.querySelector(`#party-b-list option[value="${partyBName.value}"]`);
            if (selectedOption) {
                document.getElementById('party-b-contact').value = selectedOption.getAttribute('data-contact');
                document.getElementById('party-b-phone').value = selectedOption.getAttribute('data-phone');
            }
        }

                    </tbody>
                </table>
                </div>
            `;
            
            // 创建完整的HTML文件，添加Word特定的头部信息，使用更兼容Word的结构
            const htmlContent = `<!DOCTYPE html>

        // 数字转中文大写
        function toChineseNumber(num) {
            // 处理空值或无效值
            if (!num || num === '') {
                return '';
            }
            
            // 确保num是字符串
            num = String(num);
            
            // 移除"元"字
            num = num.replace('元', '');
            
            const digits = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];
            const units = ['', '拾', '佰', '仟'];
            const bigUnits = ['', '万', '亿'];
            
            // 处理小数部分
            let integerPart = num;
            let decimalPart = '';
            if (num.includes('.')) {
                const parts = num.split('.');
                integerPart = parts[0];
                decimalPart = parts[1];
            }
            
            // 处理整数部分
            let result = '';
            let unitIndex = 0;
            let bigUnitIndex = 0;
            
            // 反转整数部分以便从右往左处理
            const reversedInteger = integerPart.split('').reverse().join('');
            
            for (let i = 0; i < reversedInteger.length; i++) {
                const digit = parseInt(reversedInteger[i]);
                
                // 每四位处理一次大单位
                if (i > 0 && i % 4 === 0) {
                    result = bigUnits[bigUnitIndex] + result;
                    bigUnitIndex++;
                    unitIndex = 0;
                }
                
                // 处理零的情况
                if (digit !== 0) {
                    result = digits[digit] + units[unitIndex] + result;
                } else {
                    // 避免连续的零
                    if (i > 0 && parseInt(reversedInteger[i-1]) !== 0) {
                        result = digits[digit] + result;
                    }
                }
                
                unitIndex++;
            }
            
            // 添加"元"字
            result += '元';
            
            // 处理小数部分
            if (decimalPart) {
                if (decimalPart.length > 0) {
                    const jiao = parseInt(decimalPart[0]) || 0;
                    if (jiao > 0) {
                        result += digits[jiao] + '角';
                    }
                }
                if (decimalPart.length > 1) {
                    const fen = parseInt(decimalPart[1]) || 0;
                    if (fen > 0) {
                        result += digits[fen] + '分';
                    }
                }
            } else {
                result += '整';
            }
            
            return result;
        }

        // 导入商品
        function importGoods(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const fileName = file.name.toLowerCase();
            const reader = new FileReader();
            
            if (fileName.endsWith('.xls') || fileName.endsWith('.xlsx')) {
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                        
                        parseAndFillGoods(jsonData);
                    } catch (error) {
                        alert('导入Excel文件失败：' + error.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            } else if (fileName.endsWith('.doc') || fileName.endsWith('.docx')) {
                reader.onload = function(e) {
                    try {
                        mammoth.extractRawText({ arrayBuffer: e.target.result })
                            .then(function(result) {
                                const text = result.value;
                                const lines = text.split('\n').filter(line => line.trim());
                                parseAndFillGoodsFromText(lines);
                            })
                            .catch(function(err) {
                                alert('导入Word文件失败：' + err.message);
                            });
                    } catch (error) {
                        alert('导入Word文件失败：' + error.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('不支持的文件格式，请导入Excel或Word文件');
            }
            
            event.target.value = '';
        }

            const items = document.querySelectorAll('.goods-item');

        // 解析数据并填充货物清单
        function parseAndFillGoods(data) {
            const goodsContainer = document.getElementById('goods-list-container');
            goodsContainer.innerHTML = '';
            
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length === 0) continue;
                
                const name = row[1] || row[0] || '';
                const unit = row[2] || '';
                const quantity = row[3] || '';
                const price = row[4] || '';
                const amount = row[5] || '';
                const remark = row[6] || '';
                
                if (name) {
                    addGoodsItem();
                    const items = document.querySelectorAll('.goods-item');
                    const lastItem = items[items.length - 1];
                    
                    lastItem.querySelector('.goods-name').value = name;
                    lastItem.querySelector('.goods-spec').value = unit;
                    lastItem.querySelector('.goods-quantity').value = quantity;
                    
                    // 处理价格，确保有小数点后两位
                    let formattedPrice = price;
                    if (formattedPrice) {
                        const numPrice = parseFloat(formattedPrice);
                        if (!isNaN(numPrice)) {
                            formattedPrice = numPrice.toFixed(2);
                        }
                    }
                    lastItem.querySelector('.goods-price').value = formattedPrice;
                    
                    // 处理金额，确保有小数点后两位
                    let formattedAmount = amount;
                    if (formattedAmount) {
                        const numAmount = parseFloat(formattedAmount);
                        if (!isNaN(numAmount)) {
                            formattedAmount = numAmount.toFixed(2);
                        }
                    } else if (quantity && formattedPrice) {
                        const qty = parseFloat(quantity) || 0;
                        const prc = parseFloat(formattedPrice) || 0;
                        formattedAmount = (qty * prc).toFixed(2);
                    }
                    lastItem.querySelector('.goods-amount').value = formattedAmount;
                    
                    lastItem.querySelector('.goods-remark').value = remark;
                }
            }
            
            calculateTotalAmount();
        }

                        <label>联系人</label>
                        <input type="text" id="party-a-contact" placeholder="联系人">
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="text" id="party-a-phone" placeholder="联系电话">
                    </div>
                </div>
                
                <div class="card">
                    <h3>乙方信息</h3>
                    <div class="form-group">
                        <label>公司名称</label>
                        <input list="party-b-list" type="text" id="party-b-name" placeholder="公司名称" onchange="selectPartyB()">
                        <datalist id="party-b-list"></datalist>
                    </div>
                    <div class="form-group">
                        <label>联系人</label>
                        <input type="text" id="party-b-contact" placeholder="联系人">
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="text" id="party-b-phone" placeholder="联系电话">
                    </div>
                </div>
                
                <div class="card full-width">
                    <h3>货物清单</h3>
                    <div id="goods-list-container">
                        <div class="goods-item">
                            <input type="text" class="goods-name" placeholder="名称">
                            <input list="units" type="text" class="goods-spec" placeholder="单位">
                            <datalist id="units">
                                <option value="个">
                                <option value="件">
                                <option value="套">
                                <option value="台">
                                <option value="套">
                                <option value="千克">
                                <option value="克">
                                <option value="吨">
                                <option value="米">
                                <option value="厘米">
                                <option value="毫米">
                                <option value="升">
                                <option value="毫升">
                                <option value="平方米">
                                <option value="立方米">
                            </datalist>
                            <input type="number" class="goods-quantity" placeholder="数量" oninput="calculateTotal()">
                            <input type="text" class="goods-price" placeholder="单价" oninput="calculateTotal()">
                            <input type="number" class="goods-amount" placeholder="金额" readonly>
                            <input type="text" class="goods-remark" placeholder="备注">
                            <button class="btn-primary" onclick="addGoodsItem()">+</button>
                            <button class="btn-danger" onclick="removeGoodsItem(this)">-</button>
                        </div>
                    </div>
                    <div class="total-amount-section">
                        <label for="total-amount">合同总金额：</label>
                        <input type="text" id="total-amount" placeholder="例如：10000元" readonly>
                    </div>
                </div>
                

            </div>
            
            <div class="button-group" style="justify-content: center;">
                <button class="btn-secondary" onclick="downloadContract()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    下载合同
                </button>
                <button class="btn-secondary" onclick="document.getElementById('import-file').click()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    导入商品
                </button>
                <input type="file" id="import-file" accept=".xls,.xlsx,.doc,.docx" style="display: none;" onchange="importGoods(event)">
                <button class="btn-secondary" onclick="openInquiryTemplate()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    询价生成
                </button>
                <button class="btn-secondary" onclick="calculateInquiry()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="20" x2="12" y2="10"></line>
                        <line x1="18" y1="20" x2="18" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="16"></line>
                    </svg>
                    询价计算
                </button>
                <button class="btn-secondary" onclick="generateDeliveryOrder()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 17l-4-4-4 4"></path>
                        <path d="M21 12H3"></path>
                    </svg>
                    生成送货单
                </button>
                <button class="btn-secondary" onclick="window.open('kkxx/index.html', '_blank')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    资料成套
                </button>
                <button class="btn-secondary" onclick="clearAllData()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                    清空数据
                </button>
            </div>
        </div>
    </div>
</body>
</html>
